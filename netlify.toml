# Deploy only the web package from the monorepo
[build]
  base = "packages/web"
  command = "npm install && npm run build"
  publish = "build"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF . ../web"

[build.environment]
  NPM_FLAGS = "--prefix=."
  NODE_VERSION = "20"
  # Google OAuth client IDs are public identifiers compiled into the React app.
  # Keep secret scanning enabled for every other variable, including secrets.
  SECRETS_SCAN_OMIT_KEYS = "GOOGLE_CLIENT_ID,REACT_APP_GOOGLE_CLIENT_ID"

# Proxy API requests to Railway backend (avoids CORS issues)
[[redirects]]
  from = "/api/*"
  to = "https://finance-trackerapi-production.up.railway.app/api/:splat"
  status = 200
  force = true

# SPA routing - redirect all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
